name: PHP Lint

on:
  push:
  pull_request:

jobs:
  php_lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: PHP lint (syntax check)
        run: |
          find . -name "*.php" -print0 | xargs -0 -n 1 php -l
