name: JS Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run coverage
        run: npm run test:coverage

      - name: Upload coverage report (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

      # Add this step after your coverage step
      - name: Generate coverage badge
        run: |
          COVERAGE=$(grep -oP '(?<=lines\s+:\s)\d+\.?\d*' coverage/lcov.info || echo 0)
          echo "Coverage: ${COVERAGE}%"
          mkdir -p coverage-badges
          curl -s "https://img.shields.io/badge/coverage-${COVERAGE}%25-brightgreen" > coverage-badges/coverage.svg

      - name: Upload coverage badge
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: coverage-badges/