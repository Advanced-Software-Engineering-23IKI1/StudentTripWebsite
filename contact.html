<!doctype html>
<html lang="en">
<head>
    <title>Tabi Cat Trips</title>
    <!-- Required meta tags -->
    <meta charset="utf-8"/>
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <link rel="icon" type="image/x-icon" href="images/tabi_logo.png"/>
    <link href="dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="dist/js/handlebars.min-v4.7.8.js"></script>
    <script src="dist/js/vanilla.js"></script>
    <!-- fonts -->
    <link href="https://fonts.googleapis.com/css?family=Varela+Round" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
          rel="stylesheet"/>
    <!-- Core theme CSS (includes Bootstrap)-->
    <link href="dist/css/styles.css" rel="stylesheet"/>
    <link href="dist/css/custom.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="dist/js/contact.js"></script>
    <style>
        .body {
            background-image: linear-gradient(#64a19d 0%, #467370 30%, #0e525e 70%);
        }
    </style>
</head>

<body class="body">
<script id="navbar-template" type="text/x-handlebars-template">
    {{#> navbar}}

    {{/navbar}}
        </script>
<div id="navbar"></div>

<main>

    <div class="container py-5 mt-5 vh-100">
        <div class="row align-items-start">
            <!-- Left Section: Image -->
            <div class="col-md-6 mb-4 mb-md-0">
                <img src="images/pexels-markus-winkler-1430818-13455578.jpg" alt="Call center representative" class="img-fluid w-100" style="margin-top: 10%; border-radius: 100%; box-shadow: 0 0 30px 15px rgba(0, 0, 0, 0.3);">
            </div>

            <!-- Right Section: Form -->
            <div class="col-md-6">
                <h2 class="mb-4">Quick Contact</h2>
                <form class="needs-validation" id="form">
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="name" placeholder="Enter your name" required>
                        <div class="invalid-feedback">Please enter your name.</div>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                        <div class="invalid-feedback">Please enter your email.</div>
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone</label>
                        <input type="text" class="form-control" id="phone" placeholder="Enter your phone number" required>
                        <div class="invalid-feedback">Please enter your phone number.</div>
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label">Message</label>
                        <textarea class="form-control" id="message" rows="4" placeholder="Your message" required></textarea>
                        <div class="invalid-feedback">Please enter a message.</div>
                    </div>
                    <button type="button" class="btn btn-primary" id="submit">Submit</button>
                </form>
            </div>
        </div>

        <!-- Contact Details -->
        <div class="row mt-5">
            <div class="col-md-4 text-center" style="background-color: #f0f6f5">
                <i class="bi bi-geo-alt fs-3"></i>
                <h5 class="mt-2">Address</h5>
                <p>19 Palmeira Avenue, Brighton, UK</p>
            </div>
            <div class="col-md-4 text-center" style="background-color: #bcbebf">
                <i class="bi bi-telephone fs-3"></i>
                <h5 class="mt-2">Phone</h5>
                <p>+44 7469 921933</p>
            </div>
            <div class="col-md-4 text-center" style="background-color: #f0f6f5">
                <i class="bi bi-envelope fs-3"></i>
                <h5 class="mt-2">Email</h5>
                <p>tabicat.info@gmail.com</p>
            </div>
        </div>
    </div>

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</main>

<script id="footer-template" type="text/x-handlebars-template">
    {{#> footer}}

    {{/footer}}
        </script>
<div id="footer"></div>

<script>
    renderPartials()
</script>

<script src="dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
