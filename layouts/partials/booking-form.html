<div class="container px-4 px-lg-5 justify-content-center">
    <h2>Optional Extras</h2>

    <div class="form-group mt-3">
        <label>Single Room Upgrade (£250)</label>
        <div class="d-flex align-items-center gap-3 mt-3">
            <button class="btn btn-secondary minusExtra" disabled>-</button>
            <span class="extraCount">0</span>
            <button class="btn btn-secondary plusExtra">+</button>
        </div>
    </div>

    <hr>

    <h2>Booking Details</h2>
    <label>Number of People:</label>
    <div class="d-flex align-items-center gap-3 mt-3">
        <button class="btn btn-secondary minusPeople" disabled>-</button>
        <span class="peopleCount">1</span>
        <button class="btn btn-secondary plusPeople">+</button>
    </div>

    <h4 class="totalPrice mt-3">Total: £{{ .page.Params.price | humanize }}</h4>

    <a class="btn btn-success mt-3 bookButton"
       data-trip-index="{{ .index }}"
       href="/form/">Book Now</a>

    {{ $bookingJS := resources.Get "js/booking_form.js" | js.Build | minify }}
    <script src="{{ $bookingJS.RelPermalink }}"></script>
</div>
