<div class="row featurette mb-5">
    <div class="col-md-6 {{ if .reverse }}order-md-2{{ end }}">
        <h2 class="featurette-heading" style="font-family:'Apple Chancery',serif;">
            {{ .title }}
        </h2>

        <p class="lead">{{ .text }}</p>

        {{ if .content }}
        <div class="mt-3">
            {{ .content | safeHTML }}
        </div>
        {{ end }}

        <div class="d-flex flex-wrap align-items-center gap-3 mt-3">
            <div class="dropdown">
                <label for="{{ .selectId }}" class="lead mb-1">Select Date:</label>
                <select id="{{ .selectId }}" class="btn btn-primary">
                    {{ range .options }}
                    <option>{{ . }}</option>
                    {{ end }}
                </select>
            </div>

            <button id="{{ .buttonId }}" class="btn btn-secondary mt-4 mt-md-0">
                Book Now
            </button>
        </div>
    </div>

    <div class="col-md-5 {{ if .reverse }}order-md-1{{ end }}">
        {{ $img := resources.Get .image }}
        <img src="{{ $img.RelPermalink }}" class="img-fluid" alt="{{ .title }}">
    </div>
</div>

<hr class="featurette-divider">
