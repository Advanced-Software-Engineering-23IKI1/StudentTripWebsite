<!doctype html>
<html lang="en">
<head>
    <title>Coincidence</title>
    <!-- Required meta tags -->
    <meta charset="utf-8"/>
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <link href="dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="dist/css/custom.css" rel="stylesheet">
    <script src="dist/js/handlebars.min-v4.7.8.js"></script>
    <script src="dist/js/vanilla.js"></script>
</head>

<body>
<script id="navbar-template" type="text/x-handlebars-template">
    {{#> navbar Cart='active'}}

    {{/navbar}}
        </script>
<div id="navbar"></div>

<main>
    <div class="bg"
         style="background-image: url('images/background4.jpg'); background-size: repeat; background-position: top;">
        <div class="container padded">
            <div class="row pt-5">
                <div class="col d-none d-md-block"></div>
                <div class="col-lg-6">
                    <ul class="list-group pb-5">
                        <li class="list-group-item">
                            <h1 class="d-flex my-3">Thank you</h1>
                            <small>for your interest in a trip with</small>
                            <strong>Tabbi Cat Trips</strong>

                            <div id="cart"></div>
                        </li>
                    </ul>
                </div>
                <div class="col d-none d-md-block"></div>
            </div>
        </div>
    </div>
</main>

<script id="cart_item_template" type="text/x-handlebars-template">
    <hr class="my-4">
    <h4 class="my-3">The information will be sent to the following address:</h4>
    <strong>{{address.firstName}} {{address.lastName}}</strong>
    <p style="line-height: 1.5rem;">{{address.address}} {{address.address2}}<br/>{{address.zip}} {{address.city}}
        , {{address.country}}</p>

    <strong>A digital copy will also be sent to:</strong>
    <p>{{address.eMail}}</p>
</script>

<script>
    renderPartials()

    render($ID("cart_item_template"), $ID("cart"), JSON.parse(localStorage.getItem("orderHist")).at(-1))
</script>

<script id="footer-template" type="text/x-handlebars-template">
    {{#> footer}} {{/footer}}
</script>
<div id="footer"></div>

<script src="dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
